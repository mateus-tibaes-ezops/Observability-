# ============================================================
# ALERTMANAGER.YML - Configuração Simplificada
# ============================================================
# Versão de testes sem Slack
# Para ativar Slack depois: configure .env com SLACK_WEBHOOK_URL

global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/slack.tmpl'

route:
  receiver: 'null'
  group_by:
    - alertname
    - job
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  routes:
    - match:
        severity: critical
      receiver: 'null'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 30m
      continue: true
    
    - match:
        severity: warning
      receiver: 'null'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 4h
      continue: true

receivers:
  - name: 'null'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
