# ============================================================
# ALERTS.RULES.YML - Regras de Alertas Prometheus
# ============================================================
# Define SLI e dispara alertas quando SLOs são violados

groups:
  # ========== GRUPO: INFRAESTRUTURA ==========
  - name: infrastructure_alerts
    interval: 15s
    rules:
      # ------
      # CPU Alerts
      # ------
      - alert: HighCpuWarning
        expr: |
          (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 2m
        labels:
          severity: warning
          component: cpu
        annotations:
          summary: "CPU alto no host {{ $labels.instance }}"
          description: |
            CPU está acima de 80% por mais de 2 minutos.
            Valor atual: {{ $value | humanize }}%
            Host: {{ $labels.instance }}
          runbook_url: "https://wiki.company.com/runbooks/high-cpu"
          dashboard_url: "http://grafana:3000/d/node-exporter"

      - alert: HighCpuCritical
        expr: |
          (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 95
        for: 1m
        labels:
          severity: critical
          component: cpu
        annotations:
          summary: "⚠️ CPU CRÍTICO no host {{ $labels.instance }}"
          description: |
            CPU está acima de 95% por mais de 1 minuto!
            Valor atual: {{ $value | humanize }}%
            Host: {{ $labels.instance }}
            AÇÃO IMEDIATA NECESSÁRIA
          runbook_url: "https://wiki.company.com/runbooks/high-cpu"
          dashboard_url: "http://grafana:3000/d/node-exporter"

      # ------
      # Memory Alerts
      # ------
      - alert: LowMemoryAvailable
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
          component: memory
        annotations:
          summary: "🔴 Memória CRÍTICA no host {{ $labels.instance }}"
          description: |
            Memória disponível está abaixo de 10% por mais de 2 minutos!
            Valor atual: {{ $value | humanize }}% utilizada
            Host: {{ $labels.instance }}
            AÇÃO IMEDIATA NECESSÁRIA
          runbook_url: "https://wiki.company.com/runbooks/high-memory"
          dashboard_url: "http://grafana:3000/d/node-exporter"

  # ========== GRUPO: APLICAÇÃO ==========
  - name: application_alerts
    interval: 15s
    rules:
      # ------
      # Service Health
      # ------
      - alert: ServiceDown
        expr: |
          up{job="application"} == 0
        for: 30s
        labels:
          severity: critical
          component: availability
        annotations:
          summary: "🔴 SERVIÇO DOWN: {{ $labels.service }}"
          description: |
            O serviço {{ $labels.service }} está down por mais de 30 segundos!
            Instância: {{ $labels.instance }}
            Job: {{ $labels.job }}
            AÇÃO IMEDIATA: verificar logs e status do container
          runbook_url: "https://wiki.company.com/runbooks/service-down"
          dashboard_url: "http://grafana:3000/d/app-health"

      # ------
      # HTTP Error Rate
      # ------
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job="application",status=~"5.."}[5m])) /
          sum(rate(http_requests_total{job="application"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "🟡 Taxa de erro HTTP alta no {{ $labels.service }}"
          description: |
            Taxa de erros 5xx está acima de 5% nos últimos 5 minutos.
            Taxa atual: {{ $value | humanizePercentage }}
            Serviço: {{ $labels.service }}
          runbook_url: "https://wiki.company.com/runbooks/high-error-rate"
          dashboard_url: "http://grafana:3000/d/app-http-metrics"

      # ------
      # Latency (P99)
      # ------
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="application"}[5m])) by (le)) > 1.0
        for: 5m
        labels:
          severity: warning
          component: latency
        annotations:
          summary: "🟡 Latência P99 elevada no {{ $labels.service }}"
          description: |
            Latência P99 está acima de 1000ms por mais de 5 minutos.
            Valor P99 atual: {{ $value | humanizeDuration }}
            Serviço: {{ $labels.service }}
          runbook_url: "https://wiki.company.com/runbooks/high-latency"
          dashboard_url: "http://grafana:3000/d/app-http-metrics"

  # ========== GRUPO: PROMETHEUS ==========
  - name: prometheus_alerts
    interval: 15s
    rules:
      - alert: PrometheusDown
        expr: |
          up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "🔴 PROMETHEUS DOWN"
          description: |
            O próprio Prometheus está down por mais de 1 minuto!
            Monitoramento comprometido.
          runbook_url: "https://wiki.company.com/runbooks/prometheus-down"
