# ============================================================
# ALERTMANAGER.YML - Configuração de Alerting
# ============================================================
# Gerencia roteamento, agrupamento e silenciamento de alertas
# Envia notificações para Slack via webhook

global:
  # Resolvido quando não há alertas há este tempo (padrão: 5m)
  resolve_timeout: 5m

# ============================================================
# CONFIGURAÇÃO DE TEMPLATES
# ============================================================
templates:
  - '/etc/alertmanager/slack.tmpl'

# ============================================================
# ROTEAMENTO DE ALERTAS
# ============================================================
route:
  # Receiver padrão para alertas não capturados por rotas específicas
  receiver: 'slack-notifications'
  
  # Agrupação de alertas
  group_by:
    - alertname
    - job
    - severity
  
  # Esperar este tempo antes de enviar primeira notificação (batch inicial)
  # Permite agrupamento de múltiplos alertas no mesmo evento
  group_wait: 30s
  
  # Intervalo mínimo entre notificações do mesmo grupo
  group_interval: 5m
  
  # Intervalo para reenviar alertas resolvidos (repetir notificação)
  repeat_interval: 4h
  
  # Sub-rotas para tratamento específico por severidade
  routes:
    # ========== ALERTAS CRÍTICOS ==========
    # Envio imediato, sem agrupamento
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s        # Reduzir wait para críticos
      group_interval: 5m
      repeat_interval: 30m   # Repetir a cada 30 min para críticos
      continue: true         # Permite passar para outras rotas também
    
    # ========== ALERTAS DE WARNING ==========
    # Agrupamento normal
    - match:
        severity: warning
      receiver: 'slack-notifications'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 4h
      continue: true

# ============================================================
# CONFIGURAÇÃO DE RECEIVERS (DESTINOS DE NOTIFICAÇÃO)
# ============================================================
receivers:
  # ========== SLACK - GERAL ==========
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'ALERTMANAGER_SLACK_WEBHOOK'
        # Canal para onde enviar os alertas
        channel: 'ALERTMANAGER_SLACK_CHANNEL'
        
        # Título da mensagem
        title: 'Alerta: {{ .GroupLabels.alertname }}'
        
        # Resumo da mensagem
        title_link: 'http://prometheus:9090/graph'
        
        # Corpo da mensagem formatado com template
        text: '{{ template "slack.default" . }}'
        
        # Usar template customizado para formatação
        # Definido em /etc/alertmanager/slack.tmpl
        
        # Adicionar campos customizados
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        
        # Ações/buttons (opcional)
        actions:
          - type: button
            text: 'Silenciar'
            url: 'http://alertmanager:9093/#/silences'
          - type: button
            text: 'Prometheus'
            url: 'http://prometheus:9090'
          - type: button
            text: 'Grafana'
            url: 'http://grafana:3000'

  # ========== SLACK - CRÍTICOS (Canal separado) ==========
  - name: 'slack-critical'
    slack_configs:
      - api_url: 'ALERTMANAGER_SLACK_WEBHOOK'
        # Canal prioritário para alertas críticos
        channel: 'ALERTMANAGER_SLACK_CHANNEL'
        
        title: '🔴 CRÍTICO: {{ .GroupLabels.alertname }}'
        title_link: 'http://prometheus:9090/graph'
        text: '{{ template "slack.default" . }}'
        send_resolved: true
        
        # Highlight crítico
        color: 'danger'

# ============================================================
# CONFIGURAÇÃO DE SILENCIAMENTO
# ============================================================
inhibit_rules:
  # ========== REGRA 1: Não alertar se serviço está down ==========
  # Se um serviço está down (critical), não alertar CPU/Memory/latency
  - source_match:
      severity: 'critical'
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'High.*|.*Error.*|.*Latency.*'
    # Igualar por job (mesma instância)
    equal: ['job', 'instance']
  
  # ========== REGRA 2: Não repetir warning se há critical ==========
  # Se CPU está crítico, não enviar warning também
  - source_match:
      severity: 'critical'
      alertname: 'HighCpuCritical'
    target_match:
      severity: 'warning'
      alertname: 'HighCpuWarning'
    equal: ['instance']

# ============================================================
# NOTAS DE CONFIGURAÇÃO
# ============================================================
# 
# 1. SLACK WEBHOOK URL:
#    - Criar em: https://api.slack.com/apps/
#    - New App → From scratch
#    - Incoming Webhooks → New Webhook to Workspace
#    - Copiar URL para .env → SLACK_WEBHOOK_URL
#
# 2. AGRUPAMENTO:
#    - group_by: agrupa alertas por estas labels
#    - group_wait: tempo para batcher inicial (defaul 30s)
#    - group_interval: tempo mínimo entre updates (padrão 5m)
#
# 3. SEVERIDADES:
#    - critical: resposta imediata, 30min repeat
#    - warning: batching 30s, 4h repeat
#
# 4. SILENCIAMENTO:
#    - inhibit_rules: suprime alertas indesejados
#    - ex: se serviceDown, não alertar sobre latência alta
#
# 5. TEMPLATES:
#    - Definidos em /etc/alertmanager/slack.tmpl
#    - Podem ser customizados para cada receiver
#
